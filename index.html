<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d1a">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://sheets.googleapis.com https://www.googleapis.com; img-src 'self' data: blob: https:; frame-src https://accounts.google.com;">
<meta name="description" content="Турнирное приложение для пляжного волейбола: счёт, таймеры, ростер, регистрация и синхронизация King of the Court.">
<title>Лютые пляжники !! King of the Court</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/logo_lp_192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css?v=4">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" integrity="sha384-zETTH+6IXxKQ6zbGcT6H6EDdnGaae9uhI8uO7doTJoNEmPGeTKVOe5S6/XybS9JH" crossorigin="anonymous"></script>
</head>
<body>
<div id="sync-topbar" class="sync-topbar" style="display:none"></div>

<!-- ── NAV ──────────────────────────────────────────────── -->
<nav id="nav">
  <div id="nav-logo" class="nav-logo-container"><div class="brand-main">ЛЮТЫЕ ПЛЯЖНИКИ !!</div><div class="brand-sub">King of the Court</div></div>
  <!-- buttons built by JS -->
</nav>

<!-- Dropdowns are OUTSIDE #nav — appended to <body> by JS -->

<!-- Backdrop: closes dropdown on outside click -->
<div id="dd-backdrop"></div>

<!-- ── SCREENS ───────────────────────────────────────────── -->
<main id="screens"></main>

<!-- ── TOAST ─────────────────────────────────────────────── -->
<div id="toast" role="status" aria-live="polite"></div>
<button id="scrollTopBtn" aria-label="Наверх">▲</button>

<script type="module" src="assets/js/main.js"></script>

<!-- Custom confirm modal -->
<div id="pwd-overlay" role="dialog" aria-modal="true" aria-labelledby="pwd-title">
  <div id="pwd-box">
    <div class="pwd-title" id="pwd-title">🔒 РОСТЕР</div>
    <div class="pwd-sub" id="pwd-sub">Введите пароль для доступа</div>
    <input id="pwd-input" type="password" placeholder="Пароль" autocomplete="current-password">
    <input id="pwd-input-2" type="password" placeholder="Повторите пароль" autocomplete="new-password" style="display:none">
    <div id="pwd-note"></div>
    <div id="pwd-error" role="alert"></div>
    <button id="pwd-ok">Войти</button>
    <br><button id="pwd-cancel">Отмена</button>
  </div>
</div>
<div id="pcard-overlay" role="dialog" aria-modal="true" aria-label="Карточка игрока">
  <div class="pcard-box" id="pcard-box"></div>
</div>
<div id="confirm-overlay" role="alertdialog" aria-modal="true" aria-labelledby="confirm-msg">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div class="confirm-btns">
      <button id="confirm-cancel">Отмена</button>
      <button id="confirm-ok">ОК</button>
    </div>
  </div>
</div>
</body>
</html>
